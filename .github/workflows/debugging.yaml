# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Summary: GitHub workflow for running pytest manually on GitHub, for testing.
#
# This workflow can only be executed manually, e.g., using the "Run workflow"
# button on https://github.com/quantumlib/Cirq/actions/workflows/debug.yaml
# Clicking the "Run workflow" button there will present a form interface with
# various options for the characteristics of the run.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

name: Debug CI jobs

on:
  workflow_dispatch:
    inputs:
      py-version:
        description: "Python version:"
        type: choice
        default: "3.12"
        options:
          - "3.12"
          - "3.11"
          - "3.10"

      os:
        description: "Runner OS:"
        type: choice
        default: ubuntu-20.04
        options:
          - ubuntu-22.04
          - ubuntu-20.04
          - macos-15
          - macos-14
          - macos-13
          - windows-2025
          - windows-2022
          - windows-2019

      single-test:
        description: "Run specific single test:"
        type: string
        default: ""

      repetitions:
        description: "Number of repetitions:"
        type: number
        default: 1

      multiple-workers:
        description: "Use multiple pytest workers"
        type: boolean
        default: true

      verbose:
        description: "Turn on verbose tracing"
        type: boolean
        default: false

      exit-first:
        description: "Stop at first error"
        type: boolean
        default: false

run-name: Debug pytest ${{inputs.single-test || '(all tests)' }} on ${{inputs.os}} with Python ${{inputs.py-version}}
jobs:
  pytest:
    name: Run pytest
    runs-on: ${{github.event.inputs.os}}
    steps:
      - name: Do miscellaneous preliminary configuration steps
        id: config
        run: |
          mkdir -p ~/.cache/pip
          case "${{github.event.inputs.os}}" in
            macos*)
              echo "arch=arm64" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "arch=x64" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Check out a copy of the Cirq git repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: python
        uses: actions/setup-python@v5
        with:
          python-version: ${{github.event.inputs.py-version}}
          architecture: ${{steps.config.outputs.arch}}
          cache: pip
          cache-dependency-path: |
            dev_tools/requirements/*.txt
            dev_tools/requirements/deps/*.txt

      - name: Install Python requirements
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade --upgrade-strategy eager -r dev_tools/requirements/dev.env.txt

      # - name: Start Quil dependencies
      #   run: docker compose -f cirq-rigetti/docker-compose.test.yaml up -d

      - name: Run pytest
        run: |
          # Common flags that used for all cases.
          flags="--durations=20 --ignore=cirq-core/cirq/contrib"
          workers="-n auto"
          if [[ "${{github.event.inputs.multiple-workers}}" == "false" ]]; then
            workers="-n0"
          fi
          if [[ "${{github.event.inputs.verbose}}" == "true" ]]; then
            flags+="-verbose --trace-config --full-trace --setup-show"
            # Save Python info to the run log, in case it's useful.
            which python
            pip list
          fi
          if [[ "${{github.event.inputs.exit-first}}" == "true" ]]; then
            flags+=" --exitfirst"
            set -e
          fi
          for i in $(seq 1 ${{github.event.inputs.repetitions}}); do
            echo "▌▌▌▌▌▌ Iteration $i ▌▌▌▌▌▌"
            check/pytest $workers $flags ${{github.event.inputs.single-test}} # --rigetti-integration
          done

      # - name: Stop Quil dependencies
      #   run: docker compose -f cirq-rigetti/docker-compose.test.yaml down
